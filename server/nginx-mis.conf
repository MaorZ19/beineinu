# nginx server block for the Maori Ink Screen API.
#
# Drop this in /etc/nginx/sites-available/maori-mis.conf, symlink into
# sites-enabled/, `nginx -t`, then `systemctl reload nginx`. Provision TLS with:
#
#     certbot --nginx -d maori.your-vps.example.com
#
# certbot edits THIS block in place: it adds the `listen 443 ssl` server, the
# ssl_certificate lines, and an HTTP->HTTPS redirect. Start with plain :80 so
# the ACME http-01 challenge can complete, then let certbot upgrade it.
server {
    listen 80;
    listen [::]:80;
    server_name maori.your-vps.example.com;

    # ESP32 sends a full-frame PNG; keep this modest but comfortable.
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rendering a frame (Chromium screenshot + 1-bit threshold) can take a
        # couple seconds on a cold browser; give it headroom.
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
